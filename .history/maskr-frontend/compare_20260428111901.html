<div class="container py-5">    <!-- Titel -->   
   <header class="mb-5">        <h1 class="display-6 fw-bold">Vergelijk Muziek</h1>    </header>    <!-- Tabs -->    <div class="mb-4">        <div class="d-flex gap-2">            <button class="btn btn-light border rounded-pill px-4">                Vergelijk Nummers            </button>            <button class="btn btn-light border rounded-pill px-4">                Vergelijk Artiesten            </button>        </div>    </div>    <!-- Selecteer nummers -->    <div class="card p-4 mb-4 shadow-sm">        <h4 class="mb-4">Selecteer nummers om te vergelijken</h4>        <div class="row align-items-center">            <!-- Nummer 1 -->            <div class="col-md-5">                <label class="form-label">Nummer 1</label>                <select id="song1" class="form-select">                    <option value="">Kies een liedje</option>                </select>            </div>            <!-- VS -->            <div class="col-md-2 text-center">                <div class="border rounded p-3 fw-bold">                    VS                </div>            </div>            <!-- Nummer 2 -->            <div class="col-md-5">                <label class="form-label">Nummer 2</label>                <select id="song2" class="form-select">                    <option value="">Kies een liedje</option>                </select>            </div>        </div>    </div>    <!-- Resultaten -->    <div class="card p-4 shadow-sm">        <h4 class="mb-4">Vergelijkingsresultaten</h4>        <table class="table align-middle">            <thead>                <tr>                    <th>Statistiek</th>                    <th id="title1">Nummer 1</th>                    <th id="title2">Nummer 2</th>                </tr>            </thead>            <tbody>                <tr>                    <td>Populariteit</td>                    <td id="pop1">-</td>                    <td id="pop2">-</td>                </tr>                <tr>                    <td>Energie</td>                    <td id="energy1">-</td>                    <td id="energy2">-</td>                </tr>                <tr>                    <td>Ritme</td>                    <td id="dance1">-</td>                    <td id="dance2">-</td>                </tr>                <tr>                    <td>Tempo</td>                    <td id="tempo1">-</td>                    <td id="tempo2">-</td>                </tr>                <tr>                    <td>Sfeer</td>                    <td id="mood1">-</td>                    <td id="mood2">-</td>                </tr>                <tr>                    <td>Akoestiek</td>                    <td id="acoustic1">-</td>                    <td id="acoustic2">-</td>                </tr>            </tbody>        </table>    </div></div>

<script src="js/compare.js"></script>

</body>
