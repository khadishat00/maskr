<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="CSS/general.css" />
  </head>
<body>
    <div class="container">
        <header class="hero">
            <h1>Welcome to Musicore</h1>
            <p>Discover, analyze, and enjoy your favorite music</p>
            
            <form id="searchForm" class="search-bar">
                <input type="text" id="searchInput" placeholder="Search for an artist or track...">
                <button type="submit">Search</button>
            </form>
        </header>

        <section class="section">
            <h2>Quick Actions</h2>
            <div class="quick-actions">
                <div class="action-card blue" onclick="location.href='/collection'">
                    <h3>View Collections</h3>
                    <p>Browse your liked tracks</p>
                </div>
                <div class="action-card orange" onclick="location.href='/guess'">
                    <h3>Guess The Song</h3>
                    <p>Test your music knowledge</p>
                </div>
            </div>
        </section>

        <section class="section">
            <h2>🎵 Song of the Week</h2>
            <div id="songOfWeekContainer">
                <p>Laden...</p>
            </div>
        </section>

        <section class="section">
            <div class="section-header">
                <h2>Popular Songs</h2>
                <button class="btn-outline">View All</button>
            </div>
            <div id="popularSongsGrid" class="horizontal-scroll">
                </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
