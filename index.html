<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="CSS/general.css" />
  </head>
  <body class="bg-light">
    <header
      class="bg-white p-3 d-flex justify-content-between align-items-center"
    >
      <h5 class="m-0">Musicore</h5>
      <a href="#" class="text-dark text-decoration-none">Mijn account</a>
    </header>

    <div class="container my-5">
      <div class="text-center mb-4">
        <h2>Kies je game</h2>
      </div>

      <div class="row g-4">
        <!-- Card 1 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card shadow-sm">
            <img src="images/music.jpg" class="card-img-top" alt="" />
            <div class="card-body">
              <h5 class="card-title">Musicore</h5>
              <p class="card-text">Deel en ontdek muziek</p>
              <a href="signin.html" class="btn btn-dark">Ga naar project</a>
            </div>
          </div>
        </div>

        <!-- Card 2 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card shadow-sm">
            <img src="images/gamehub.jpg" class="card-img-top" alt="" />
            <div class="card-body">
              <h5 class="card-title">Gamehub</h5>
              <p class="card-text">Speel, ontdek en beleef games</p>
              <a href="#" class="btn btn-dark" onclick="alert('Je hebt geen toegang tot Gamehub!')">Ga naar project</a>
            </div>
          </div>
        </div>

        <!-- Card 3 -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card shadow-sm">
            <img src="images/lego.jpg" class="card-img-top" alt="" />
            <div class="card-body">
              <h5 class="card-title">Lego</h5>
              <p class="card-text">Creëer je eigen wereld met lego</p>
              <a href="#" class="btn btn-dark" onclick="alert('Je hebt geen toegang tot Lego!')">Ga naar project</a>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
