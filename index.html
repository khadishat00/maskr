<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/general.css" />
  </head>
  <body class="bg-light">
    
    <div class="container mt-5 pt-5">
      <div class="text-center mb-4">
        <h2>Kies je game</h2>
      </div>

      <div class="row g-4">
        <!-- musicore -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card shadow-sm">
            <img
              src="https://images.pexels.com/photos/4088014/pexels-photo-4088014.jpeg?_gl=1*a618h8*_ga*MzAzNjEzNzQ0LjE3NzExNzQzOTg.*_ga_8JE65Q40S6*czE3NzM2MDc0OTYkbzQkZzEkdDE3NzM2MDc1MDgkajQ4JGwwJGgw"
              class="card-img-top"
              alt="music-img"
            />
            <div class="card-body">
              <h5 class="card-title">Musicore</h5>
              <p class="card-text text-purple-900">Deel en ontdek muziek</p>
              <a href="signin.html" class="btn btn-dark">Kies deze game</a>
            </div>
          </div>
        </div>

        <!-- gamehub -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card shadow-sm">
            <img
              src="https://cdn.pixabay.com/photo/2019/04/10/15/08/xbox-4117267_1280.jpg"
              class="card-img-top"
              alt="gamehub-img"
            />
            <div class="card-body">
              <h5 class="card-title">Gamehub</h5>
              <p class="card-text text-purple-900">
                Speel, ontdek en beleef games
              </p>
              <a
                href="#"
                class="btn btn-dark"
                onclick="alert('Je hebt geen toegang tot Gamehub!')"
                >Kies deze game</a
              >
            </div>
          </div>
        </div>

        <!-- lego -->
        <div class="col-12 col-md-6 col-lg-4">
          <div class="card shadow-sm">
            <img
              src="https://images.unsplash.com/photo-1613431812949-77b3351bb23d?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTV8fGJsYWNrJTIwd2hpdGUlMjBsZWdvc3xlbnwwfHwwfHx8MA%3D%3D"
              class="card-img-top"
              alt="lego-img"
            />
            <div class="card-body">
              <h5 class="card-title">Lego</h5>
              <p class="card-text text-purple-900">
                Creëer je eigen wereld met lego
              </p>
              <a
                href="#"
                class="btn btn-dark"
                onclick="alert('Je hebt geen toegang tot Lego!')"
                >Kies deze game</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
