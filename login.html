<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="CSS/general.css" />
  </head>
  <body class="bg-light">
    <!-- Header -->
    <header
      class="bg-white p-3 d-flex justify-content-between align-items-center"
    >
      <h5 class="m-0">Musicore</h5>
      <a href="#" class="text-dark text-decoration-none">Mijn Account</a>
    </header>

    <!-- Hoofdcontainer -->
    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 85vh"
    >
      <div
        class="card shadow p-4"
        style="max-width: 450px; width: 100%; border-radius: 12px"
      >
        <div class="text-center mb-4">
          <h2 class="mb-1">Welkom!</h2>
          <p class="text-muted">Log in om verder te gaan</p>
        </div>

        <form>
          <!-- E-mail -->
          <div class="mb-3">
            <label for="email" class="form-label">E-mail</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="Voer je e-mail in"
              required
            />
          </div>

          <!-- Wachtwoord -->
          <div class="mb-3">
            <label for="password" class="form-label">Wachtwoord</label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Voer je wachtwoord in"
              required
            />

            <div class="text-end mt-2">
              <a href="#" class="text-primary small text-decoration-none">
                Wachtwoord vergeten?
              </a>
            </div>
          </div>

          <!-- Knop inloggen -->
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-dark">Inloggen</button>
          </div>
        </form>

        <div class="text-center mt-3">
          <small>
            Nog geen account?
            <a href="signin.html" class="text-primary text-decoration-none">
              Aanmelden
            </a>
          </small>
        </div>
      </div>
    </div>
  </body>
</html>
