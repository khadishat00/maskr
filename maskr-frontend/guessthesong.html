<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Musicore</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
  </head>
  <header class="py-2 mb-3 border-bottom bg-white">
    <div
      class="container d-flex align-items-center justify-content-between"
    >
      <div class="logo">
       <a href="home.html"> <img src="assets/logo.png" alt="logo" width="50" height="50" /></a>
      </div>
      <div class="dropdown">
        <button
          class="btn dropdown-toggle"
          type="button"
          data-bs-toggle="dropdown"
          style="
            background-color: white;
            border: 2px solid purple;
            color: black;" >
          Kies je mood
        </button>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#"> Blij</a></li>
          <li><a class="dropdown-item" href="#"> Moe</a></li>
          <li><a class="dropdown-item" href="#"> Gemotiveerd</a></li>
          <li><a class="dropdown-item" href="#"> Relaxed</a></li>
        </ul>
      </div>
      <div class="dropdown">
        <img
          src="https://images.pexels.com/photos/6985001/pexels-photo-6985001.jpeg"
          alt="profiel"
          width="32"
          height="32"
          class="rounded-circle dropdown-toggle"
          data-bs-toggle="dropdown"
          style="cursor: pointer"
        />

        <ul class="dropdown-menu dropdown-menu-end text-small shadow">
          <li><a class="dropdown-item" href="#">Profiel</a></li>  <!-- profile page nog aanmaken-->
          <li><hr class="dropdown-divider" /></li>
          <li><a class="dropdown-item" href="index.html">Afmelden</a></li>
        </ul>
      </div>
    </div>
  </header>
  <body class="bg">
    <div class="container py-5 space-y-5">
      <header class="text-center mb-5">
        <h1 class="display-5 fw-bold text-black mb-3">Welkom bij Musicore</h1>
        <p class="lead text-purple-900 mb-4">
          Ontdek, analyseer en geniet van je favoriete muziek
        </p>

        <form
          id="searchForm"
          class="mt-4 mx-auto position-relative"
          style="max-width: 700px"
        >
          <div class="search-wrapper shadow-lg">
            <i data-lucide="search" class="search-icon text-purple-700"></i>
            <input
              type="text"
              id="searchInput"
              class="form-control custom-input"
              placeholder="Zoek naar een artiest of nummer..."
            />
            <button class="btn btn-dark btn-search" type="submit">
              Zoeken
            </button>
          </div>
        </form>
      </header>
<body>
  <nav class="navbar">
    <div class="logo">Musicore</div>

    <div class="mood-area">
      <label for="moodSelect">Current Mood</label>
      <select id="moodSelect">
        <option value="chill">Chill</option>
        <option value="happy">Happy</option>
        <option value="party">Party</option>
        <option value="focus">Focus</option>
      </select>
    </div>

    <div class="icons">
      <span>Search</span>
      <span>Fav</span>
      <div class="avatar">U</div>
    </div>
  </nav>

  <main class="container">
    <div class="title-row">
      <h1>Guess The Song</h1>

      <div class="score-box">
        <span>Score: <span id="score">0</span></span>
        <button id="resetButton">Reset</button>
      </div>
    </div>

    <div id="moodBadge" class="mood-badge">Current Mood: Chill</div>

    <div class="card">
      <h2>Now Playing</h2>
      <img id="coverImage" src="" alt="Album cover">
      <button id="playButton">Play 15-Second Preview</button>
      <p id="statusText">Loading song...</p>
    </div>

    <div class="card">
      <h2>What is this song?</h2>
      <p>Type the title or artist name:</p>

      <form id="guessForm">
        <input id="guessInput" type="text" placeholder="Enter your guess...">
        <button id="submitButton" type="submit" disabled>Submit Guess</button>
      </form>

      <p id="message"></p>
    </div>
  </main>

  <script src="js/game.js"></script>
</body>
</html>
