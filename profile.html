<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profiel</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/general.css" />
  </head>

  <body class="bg-light">
    <!-- Header -->
    <header class="py-2 mb-3 border-bottom bg-white">
      <div class="container d-flex align-items-center justify-content-between">
        <div class="logo">
          <img src="assets/logo.png" alt="logo" width="50" height="50" />
        </div>
      </div>
    </header>

    <!-- Profiel -->
    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 85vh"
    >
      <div
        class="card shadow p-4 text-center"
        style="max-width: 500px; width: 100%; border-radius: 12px"
      >
        <!-- Profielfoto -->
        <div class="mb-3">
          <img
            src="assets/user.png"
            alt="avatar"
            class="rounded-circle"
            width="100"
            height="100"
          />
        </div>

        <!-- Gebruikersnaam -->
        <h3 class="mb-3">Gebruikersnaam</h3>

        <!-- Gegevens -->
        <div class="text-start mb-4">
          <p><strong>E-mail:</strong> gebruiker@email.com</p>
          <p><strong>GSM:</strong> +32 123 45 67 89</p>
          <p><strong>Rank:</strong> Pro</p>
        </div>

        <!-- Knoppen -->
        <div class="d-grid gap-2">
          <button class="btn btn-dark">Wachtwoord wijzigen</button>
          <button class="btn btn-outline-secondary">Uitloggen</button>
        </div>
      </div>
    </div>
  </body>
</html>
