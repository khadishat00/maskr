<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aanmelden</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/general.css" />
  </head>
  <body class="bg-light">
  <header class="py-2 mb-3 border-bottom bg-white">
  <div class="container-fluid d-flex align-items-center justify-content-between">

  <div class="logo">
    <a href="home.html"> <img src="assets/logo.png" alt="logo" width="50" height="50" /></a>
  </div>
    
</header>
    <div
      class="container d-flex justify-content-center align-items-center"
      style="min-height: 85vh"
    >
      <div
        class="card shadow p-4"
        style="max-width: 500px; width: 100%; border-radius: 12px"
      >
        <div class="text-center mb-4">
          <h2 class="mb-1">Registreren</h2>
          <p class="text-muted">Maak je account aan</p>
        </div>

        <form>
          <!-- Gebruikersnaam -->
          <div class="mt-3">
            <label for="username" class="form-label">Gebruikersnaam</label>
            <input
              type="text"
              class="form-control"
              id="username"
              placeholder="Kies een gebruikersnaam"
              required
            />
          </div>

          <!-- Email -->
          <div class="mt-3">
            <label for="email" class="form-label">E-mail</label>
            <input
              type="email"
              class="form-control"
              id="email"
              placeholder="Voer je e-mail in"
              required
            />
          </div>

          <!-- Wachtwoord -->
          <div class="mt-3">
            <label for="password" class="form-label">Wachtwoord</label>
            <input
              type="password"
              class="form-control"
              id="password"
              placeholder="Maak een wachtwoord"
              required
            />
            <div class="form-text">
              Wachtwoord moet minstens 8 tekens bevatten
            </div>
          </div>
          <div class="d-grid mt-4">
            <button type="submit" class="btn btn-dark">Account aanmaken</button>
          </div>
        </form>

        <div class="text-center mt-3">
          <small>
            Heb je al een account?
            <a href="login.html" class="text-primary text-decoration-none"
              >Inloggen</a
            >
          </small>
        </div>
      </div>
    </div>
  </body>
</html>
